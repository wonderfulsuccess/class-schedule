<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三年二班 · 快乐课程表</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=ZCOOL+KuaiLe&display=swap');

    :root {
      --bg-1: #fff9f0;
      --bg-2: #f2fbff;
      --pink: #ffd6e7;
      --peach: #ffe0c7;
      --yellow: #fff2b2;
      --mint: #c9f7df;
      --sky: #cde9ff;
      --lavender: #e1d8ff;
      --text: #3a3a60;
      --card: #ffffffcc;
      --shadow: 0 10px 24px rgba(116, 105, 168, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Baloo 2', 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, #ffffffa0 0 20%, transparent 21%),
        radial-gradient(circle at 85% 12%, #ffffffb0 0 18%, transparent 19%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
      position: relative;
    }

    .sky-decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .cloud {
      position: absolute;
      width: 120px;
      height: 56px;
      background: #ffffffcc;
      border-radius: 40px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.08));
      animation: drift 18s linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cloud::before {
      width: 52px;
      height: 52px;
      left: 14px;
      top: -24px;
    }

    .cloud::after {
      width: 62px;
      height: 62px;
      right: 12px;
      top: -30px;
    }

    .cloud.one { top: 8%; left: -160px; animation-delay: -2s; }
    .cloud.two { top: 24%; left: -200px; width: 150px; animation-delay: -8s; }

    .star {
      position: absolute;
      font-size: 22px;
      opacity: 0.8;
      animation: twinkle 2.4s ease-in-out infinite;
    }

    .star.a { top: 12%; left: 20%; }
    .star.b { top: 18%; right: 14%; animation-delay: 0.8s; }
    .star.c { top: 70%; left: 10%; animation-delay: 1.4s; }

    .rainbow {
      position: absolute;
      width: 220px;
      height: 110px;
      border-radius: 120px 120px 0 0;
      border: 10px solid #ff9cb6;
      border-bottom: 0;
      right: -34px;
      bottom: 24px;
      transform: rotate(-8deg);
      opacity: 0.55;
    }

    .rainbow::before,
    .rainbow::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: inherit;
      border-bottom: 0;
    }

    .rainbow::before {
      width: 180px;
      height: 90px;
      top: 8px;
      border: 9px solid #ffd36c;
    }

    .rainbow::after {
      width: 140px;
      height: 70px;
      top: 16px;
      border: 8px solid #91e7c0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(980px, 94vw);
      margin: 24px auto 40px;
      padding: 22px;
    }

    .hero {
      background: linear-gradient(120deg, var(--pink), var(--sky), var(--yellow));
      border-radius: 26px;
      padding: 24px 20px;
      box-shadow: var(--shadow);
      text-align: center;
      animation: popIn 0.7s ease;
    }

    h1 {
      margin: 0;
      font-family: 'ZCOOL KuaiLe', 'Baloo 2', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      letter-spacing: 2px;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: clamp(1rem, 3vw, 1.25rem);
    }

    .day-tabs {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .day-btn {
      border: 0;
      background: #fff;
      color: var(--text);
      padding: 12px 8px;
      font: inherit;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 5px 14px rgba(67, 93, 128, 0.15);
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
      font-weight: 700;
    }

    .day-btn:hover,
    .day-btn:focus-visible {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 18px rgba(67, 93, 128, 0.2);
      outline: none;
    }

    .day-btn.active {
      background: linear-gradient(120deg, #ffedf4, #eaf8ff);
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(67, 93, 128, 0.22);
    }

    .panel {
      margin-top: 22px;
      background: var(--card);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: clamp(1.2rem, 3.4vw, 1.7rem);
    }

    .class-list {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .class-card {
      min-height: 92px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px 8px;
      font-size: 1.06rem;
      font-weight: 700;
      box-shadow: 0 8px 12px rgba(78, 94, 116, 0.14);
      transform: translateY(14px);
      opacity: 0;
      animation: riseIn 0.5s ease forwards;
    }

    .class-card:nth-child(1) { animation-delay: 0.02s; }
    .class-card:nth-child(2) { animation-delay: 0.1s; }
    .class-card:nth-child(3) { animation-delay: 0.18s; }
    .class-card:nth-child(4) { animation-delay: 0.26s; }
    .class-card:nth-child(5) { animation-delay: 0.34s; }

    .c1 { background: #ffe1ec; }
    .c2 { background: #ffe8ce; }
    .c3 { background: #fff4bd; }
    .c4 { background: #cef6e2; }
    .c5 { background: #d7ebff; }

    .tip {
      margin-top: 14px;
      font-size: 0.98rem;
      opacity: 0.85;
    }

    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(100vw + 300px)); }
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(1); opacity: 0.65; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes riseIn {
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 760px) {
      .wrap { margin-top: 14px; padding: 12px; }
      .hero { border-radius: 22px; }
      .day-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .day-btn:last-child {
        grid-column: 1 / -1;
      }
      .class-list {
        grid-template-columns: 1fr 1fr;
      }
      .class-card:last-child {
        grid-column: 1 / -1;
      }
      .rainbow {
        width: 160px;
        height: 82px;
      }
    }
  </style>
</head>
<body>
  <div class="sky-decor" aria-hidden="true">
    <div class="cloud one"></div>
    <div class="cloud two"></div>
    <div class="star a">⭐</div>
    <div class="star b">✨</div>
    <div class="star c">🌟</div>
    <div class="rainbow"></div>
  </div>

  <main class="wrap">
    <section class="hero">
      <h1>🌈 三年二班课程表</h1>
      <p class="subtitle">点击星期，看看今天有哪些有趣课程吧！</p>
      <div class="day-tabs" id="dayTabs"></div>
    </section>

    <section class="panel" aria-live="polite">
      <h2 id="dayTitle">星期一</h2>
      <div class="class-list" id="classList"></div>
      <p class="tip">小提示：每天都元气满满，开心学习！</p>
    </section>
  </main>

  <script>
    const schedule = {
      '星期一': ['📚语文', '🔢数学', '🏃体育', '🔬科学', '🎵音乐'],
      '星期二': ['🔢数学', '📚语文', '🗣️英语', '🎨美术', '🏃体育'],
      '星期三': ['📚语文', '🔢数学', '📚语文', '🧩综合', '👨‍👩‍👧班会'],
      '星期四': ['🗣️英语', '📚语文', '🔢数学', '🎨美术', '🔬科学'],
      '星期五': ['🔢数学', '📚语文', '🗣️英语', '🏃体育', '👨‍👩‍👧家长课堂']
    };

    const dayTabs = document.getElementById('dayTabs');
    const dayTitle = document.getElementById('dayTitle');
    const classList = document.getElementById('classList');

    const colors = ['c1', 'c2', 'c3', 'c4', 'c5'];
    const days = Object.keys(schedule);

    function render(day) {
      dayTitle.textContent = day;
      classList.innerHTML = '';

      schedule[day].forEach((subject, i) => {
        const card = document.createElement('article');
        card.className = `class-card ${colors[i % colors.length]}`;
        card.textContent = `第${i + 1}节 ${subject}`;
        classList.appendChild(card);
      });

      [...dayTabs.children].forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.day === day);
      });
    }

    days.forEach((day, idx) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'day-btn';
      btn.dataset.day = day;
      btn.textContent = day;
      btn.addEventListener('click', () => render(day));
      dayTabs.appendChild(btn);
      if (idx === 0) btn.classList.add('active');
    });

    render(days[0]);
  </script>
</body>
</html>
