<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三年二班 · 快乐课程表</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=ZCOOL+KuaiLe&display=swap');

    :root {
      --bg-1: #fff9f0;
      --bg-2: #f2fbff;
      --pink: #ffd6e7;
      --peach: #ffe0c7;
      --yellow: #fff2b2;
      --mint: #c9f7df;
      --sky: #cde9ff;
      --lavender: #e1d8ff;
      --text: #3a3a60;
      --card: #ffffffcc;
      --shadow: 0 10px 24px rgba(116, 105, 168, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Baloo 2', 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, #ffffffa0 0 20%, transparent 21%),
        radial-gradient(circle at 85% 12%, #ffffffb0 0 18%, transparent 19%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
      position: relative;
    }

    .sky-decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .cloud {
      position: absolute;
      width: 120px;
      height: 56px;
      background: #ffffffcc;
      border-radius: 40px;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.08));
      animation: drift 18s linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .cloud::before {
      width: 52px;
      height: 52px;
      left: 14px;
      top: -24px;
    }

    .cloud::after {
      width: 62px;
      height: 62px;
      right: 12px;
      top: -30px;
    }

    .cloud.one { top: 8%; left: -160px; animation-delay: -2s; }
    .cloud.two { top: 24%; left: -200px; width: 150px; animation-delay: -8s; }

    .star {
      position: absolute;
      font-size: 22px;
      opacity: 0.8;
      animation: twinkle 2.4s ease-in-out infinite;
    }

    .star.a { top: 12%; left: 20%; }
    .star.b { top: 18%; right: 14%; animation-delay: 0.8s; }
    .star.c { top: 70%; left: 10%; animation-delay: 1.4s; }

    .rainbow {
      position: absolute;
      width: 220px;
      height: 110px;
      border-radius: 120px 120px 0 0;
      border: 10px solid #ff9cb6;
      border-bottom: 0;
      right: -34px;
      bottom: 24px;
      transform: rotate(-8deg);
      opacity: 0.55;
    }

    .rainbow::before,
    .rainbow::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-radius: inherit;
      border-bottom: 0;
    }

    .rainbow::before {
      width: 180px;
      height: 90px;
      top: 8px;
      border: 9px solid #ffd36c;
    }

    .rainbow::after {
      width: 140px;
      height: 70px;
      top: 16px;
      border: 8px solid #91e7c0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(980px, 96vw);
      margin: 0 auto;
      height: 100vh;
      padding: 14px 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .hero {
      background: linear-gradient(120deg, var(--pink), var(--sky), var(--yellow));
      border-radius: 26px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      text-align: center;
      animation: popIn 0.7s ease;
    }

    h1 {
      margin: 0;
      font-family: 'ZCOOL KuaiLe', 'Baloo 2', sans-serif;
      font-size: clamp(1.45rem, 4.2vw, 2.2rem);
      letter-spacing: 1px;
    }

    .week-badge {
      margin: 8px auto 0;
      width: fit-content;
      padding: 7px 14px;
      border-radius: 999px;
      background: #ffffffd8;
      font-size: clamp(0.96rem, 2.6vw, 1.1rem);
      font-weight: 700;
      box-shadow: 0 4px 10px rgba(67, 93, 128, 0.14);
    }

    .date-line {
      margin-top: 10px;
      font-size: clamp(1.25rem, 4.4vw, 1.9rem);
      font-weight: 700;
      text-shadow: 0 2px 0 #ffffff80;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: clamp(0.9rem, 2.8vw, 1.08rem);
    }

    .panel {
      flex: 1;
      min-height: 0;
      background: var(--card);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: pan-y;
    }

    .day-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .nav-btn {
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 700;
      color: var(--text);
      background: #fff;
      box-shadow: 0 5px 14px rgba(67, 93, 128, 0.15);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .nav-btn:active {
      transform: scale(0.96);
    }

    .day-title {
      margin: 0;
      text-align: center;
      font-size: clamp(1.4rem, 4.2vw, 2rem);
      white-space: nowrap;
      flex: 1;
    }

    .slide-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: #ffffffb8;
      padding: 14px;
    }

    .slide-content {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .slide-content.slide-next {
      animation: slideFromRight 0.42s ease;
    }

    .slide-content.slide-prev {
      animation: slideFromLeft 0.42s ease;
    }

    .class-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      align-content: start;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .class-card {
      min-height: 92px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px 8px;
      font-size: 1.05rem;
      font-weight: 700;
      box-shadow: 0 8px 12px rgba(78, 94, 116, 0.14);
      transform: translateY(14px);
      opacity: 0;
      animation: riseIn 0.45s ease forwards;
    }

    .class-card:nth-child(1) { animation-delay: 0.02s; }
    .class-card:nth-child(2) { animation-delay: 0.1s; }
    .class-card:nth-child(3) { animation-delay: 0.18s; }
    .class-card:nth-child(4) { animation-delay: 0.26s; }
    .class-card:nth-child(5) { animation-delay: 0.34s; }

    .c1 { background: #ffe1ec; }
    .c2 { background: #ffe8ce; }
    .c3 { background: #fff4bd; }
    .c4 { background: #cef6e2; }
    .c5 { background: #d7ebff; }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      color: #5c6790;
      background: linear-gradient(160deg, #ffffffd4, #eef7ffb0);
      border-radius: 16px;
      padding: 16px;
    }

    .tip {
      margin-top: 10px;
      margin-bottom: 0;
      font-size: 0.94rem;
      text-align: center;
      opacity: 0.86;
    }

    @keyframes drift {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(100vw + 300px)); }
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(1); opacity: 0.65; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(14px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes riseIn {
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideFromRight {
      from { transform: translateX(26px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideFromLeft {
      from { transform: translateX(-26px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 760px) {
      .wrap {
        width: 100vw;
        padding: 10px;
        gap: 10px;
      }

      .hero {
        border-radius: 20px;
        padding: 12px 10px;
      }

      .panel {
        border-radius: 20px;
        padding: 10px;
      }

      .slide-wrap {
        padding: 10px;
      }

      .class-list {
        grid-template-columns: 1fr;
      }

      .class-card {
        min-height: 80px;
      }

      .rainbow {
        width: 160px;
        height: 82px;
      }
    }
  </style>
</head>
<body>
  <div class="sky-decor" aria-hidden="true">
    <div class="cloud one"></div>
    <div class="cloud two"></div>
    <div class="star a">⭐</div>
    <div class="star b">✨</div>
    <div class="star c">🌟</div>
    <div class="rainbow"></div>
  </div>

  <main class="wrap">
    <section class="hero">
      <h1>🌈 三年二班课程表</h1>
      <div class="week-badge" id="weekBadge">第1周 · 单周</div>
      <div class="date-line" id="dateLine">2026年3月6日 · 星期五</div>
      <p class="subtitle">左右滑动切换昨天/明天，看看今天的精彩课程！</p>
    </section>

    <section class="panel" aria-live="polite" id="swipeArea">
      <div class="day-row">
        <button type="button" class="nav-btn" id="prevBtn">⬅️ 昨天</button>
        <h2 class="day-title" id="dayTitle">星期五</h2>
        <button type="button" class="nav-btn" id="nextBtn">明天 ➡️</button>
      </div>

      <div class="slide-wrap">
        <div class="slide-content" id="slideContent">
          <ul class="class-list" id="classList"></ul>
        </div>
      </div>

      <p class="tip">小提示：每天都元气满满，开心学习！</p>
    </section>
  </main>

  <script>
    const schedule = {
      1: ['第1节 道法2 陈美君', '第2节 数学 赖明焕', '第3节 语文 陈美君', '第4节 美术 吕晋欣', '第5节 围棋/英语活动', '第6节 体育 赖教杨', '第7节 无课'],
      2: ['第1节 英语 曾丽萍', '第2节 语文 陈美君', '第3节 科学 邱翔晴', '第4节 语文 陈美君', '第5节 思维训练/心理健康', '第6节 体育 赖教杨', '第7节 无课'],
      3: ['第1节 数学 赖明焕', '第2节 语文 陈美君', '第3节 体育 赖教杨', '第4节 劳动 杨泓月', '第5节 美术 吕晋欣', '第6节 书法 陈美君', '第7节 无课'],
      4: ['第1节 语文 陈美君', '第2节 英语 曾丽萍', '第3节 数学 赖明焕', '第4节 音乐 张馨予', '第5节 体育 王倩', '第6节 道法/信息科技', '第7节 无课'],
      5: ['第1节 语文 陈美君', '第2节 英语 曾丽萍', '第3节 音乐 张馨予', '第4节 数学 赖明焕', '第5节 体育 赖教杨', '第6节 语文阅读 陈美君', '第7节 综合实践 陈美君']
    };

    const dayNames = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    const colors = ['c1', 'c2', 'c3', 'c4', 'c5', 'c2', 'c1'];
    const msPerDay = 24 * 60 * 60 * 1000;

    const termStart = new Date('2025-09-01T00:00:00');
    const currentDate = new Date('2026-03-06T00:00:00');

    const weekBadge = document.getElementById('weekBadge');
    const dateLine = document.getElementById('dateLine');
    const dayTitle = document.getElementById('dayTitle');
    const classList = document.getElementById('classList');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const slideContent = document.getElementById('slideContent');
    const swipeArea = document.getElementById('swipeArea');

    let viewingDate = normalizeDate(currentDate);

    function normalizeDate(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      return `${y}年${m}月${d}日`;
    }

    function getWeekInfo(date) {
      const diffDays = Math.floor((normalizeDate(date) - termStart) / msPerDay);
      const week = Math.max(1, Math.floor(diffDays / 7) + 1);
      return {
        week,
        oddEven: week % 2 === 1 ? '单周' : '双周'
      };
    }

    function render() {
      const weekday = viewingDate.getDay();
      const dayName = dayNames[weekday];
      const classes = schedule[weekday] || [];
      const weekInfo = getWeekInfo(viewingDate);

      dateLine.textContent = `${formatDate(viewingDate)} · ${dayName}`;
      dayTitle.textContent = dayName;
      weekBadge.textContent = `第${weekInfo.week}周 · ${weekInfo.oddEven}`;
      classList.innerHTML = '';

      if (!classes.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.innerHTML = '🌈 今天是休息日<br>好好玩耍，也别忘了阅读哦！';
        classList.replaceWith(empty);
        const oldEmpty = slideContent.querySelector('.empty');
        if (oldEmpty && oldEmpty !== empty) oldEmpty.remove();
        return;
      }

      const oldEmpty = slideContent.querySelector('.empty');
      if (oldEmpty) oldEmpty.remove();
      if (!slideContent.contains(classList)) {
        slideContent.prepend(classList);
      }

      classes.forEach((subject, i) => {
        const card = document.createElement('li');
        card.className = `class-card ${colors[i % colors.length]}`;
        card.textContent = `第${i + 1}节 ${subject}`;
        classList.appendChild(card);
      });
    }

    function shiftDay(offset, directionClass) {
      viewingDate = normalizeDate(new Date(viewingDate.getTime() + offset * msPerDay));
      slideContent.classList.remove('slide-next', 'slide-prev');
      render();
      void slideContent.offsetWidth;
      slideContent.classList.add(directionClass);
    }

    prevBtn.addEventListener('click', () => shiftDay(-1, 'slide-prev'));
    nextBtn.addEventListener('click', () => shiftDay(1, 'slide-next'));

    let touchStartX = 0;
    let touchStartY = 0;

    swipeArea.addEventListener('touchstart', (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    swipeArea.addEventListener('touchend', (event) => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      const minSwipe = 50;

      if (Math.abs(dx) > minSwipe && Math.abs(dx) > Math.abs(dy) * 1.2) {
        if (dx < 0) {
          shiftDay(1, 'slide-next');
        } else {
          shiftDay(-1, 'slide-prev');
        }
      }
    }, { passive: true });

    render();
  </script>
</body>
</html>
